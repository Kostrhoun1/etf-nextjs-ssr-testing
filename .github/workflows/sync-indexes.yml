name: Sync indexů (data pro backtest)

# Nahrazuje odstavený job `backtest` v repu etf-astro, který 15.7.2026 smazal 419 řádků sp500
# a produkce pak půl dne ukazovala čísla o 15 % vedle. Popis: BACKTEST-DATA.md
#
# Proč denně přírůstkově + v neděli plný resync:
#   Yahoo `adj-close` se po výplatě dividendy mění ZPĚTNĚ (přeškáluje celou historii). Samotné
#   dolepování nových dnů by proto vyrobilo zlom uprostřed řady. Denní běh tahá ~20 řádků/index
#   (levné), nedělní srovná drift. Obojí jen upsertem — spadlý běh nikdy neubere data.

on:
  schedule:
    - cron: '30 6 * * 1-6'   # po-so 06:30 UTC – přírůstkově (US trhy dávno zavřené)
    - cron: '0 7 * * 0'      # neděle 07:00 UTC – plný resync
  workflow_dispatch:
    inputs:
      full:
        description: 'Plný resync celé historie (jinak jen posledních ~30 dnů)'
        type: boolean
        default: false

concurrency:
  group: sync-indexes
  cancel-in-progress: false

jobs:
  sync:
    name: Sync + kontrola integrity
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ověřit, že je klíč nastavený
        run: |
          if [ -z "$SUPABASE_KEY" ]; then
            echo "::error::Chybí secret SUPABASE_KEY (Settings → Secrets → Actions). Musí to být NOVÝ formát sb_secret_… – legacy JWT klíče Supabase zakázal."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Loader si manifest (indexes.ts) překládá projektovým tsc, aby existovala jen JEDNA pravda.
      - name: Instalace závislostí
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Sync indexů
        run: |
          if [ "${{ github.event.schedule }}" = "0 7 * * 0" ] || [ "${{ inputs.full }}" = "true" ]; then
            echo "▶ PLNÝ RESYNC"
            node scripts/backtest/sync-indexes.mjs --full
          else
            echo "▶ přírůstkově"
            node scripts/backtest/sync-indexes.mjs
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalace supabase klienta
        run: pip install --quiet supabase

      # Historie počtů řádků z minulého běhu – bez ní by hlídač nepoznal ÚBYTEK dat
      # (přesně to nám 15.7. uteklo). Klíč je rolling: každý běh uloží novou cache.
      - name: Načíst historii integrity
        uses: actions/cache@v4
        with:
          path: .secrets/index-integrity-history.json
          key: index-integrity-${{ github.run_id }}
          restore-keys: index-integrity-

      - name: Kontrola integrity dat
        run: python scripts/backtest/check_index_integrity.py

      - name: Když integrita selže
        if: failure()
        run: |
          echo "::error::Kontrola integrity NEPROSLA - v index_historical_data chybi data nebo ubyly radky."
          echo "::error::Neignorovat. Presne tohle 15.7.2026 zpusobilo, ze produkce ukazovala 611 812 Kc misto 738 487 Kc."
          echo "::error::Postup viz BACKTEST-DATA.md"
