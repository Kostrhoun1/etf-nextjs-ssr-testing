name: Prod smoke test

# Kontrola produkce: (1) v prohlížeči reálně klikne na nástroje (chytí klientské bugy),
# (2) ověří SPRÁVNOST čísel backtestu (chytí bugy typu „DCA se počítá jako výnos").
# Běží hlavně po deployi (tam bugy vznikají) + 1× denně pojistka. Selhání = notifikace.

on:
  push:
    branches: [main] # po každém deployi na produkci
  schedule:
    - cron: '0 6 * * *' # 1× denně (06:00 UTC ~ 08:00 CEST) jako pojistka
  workflow_dispatch: {} # ruční spuštění tlačítkem

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci || npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Kontrola produkce (smoke + správnost, s čekáním na deploy)
        env:
          BASE_URL: https://etfpruvodce.cz
        run: |
          # Po pushi Vercel chvíli buildí – smoke zkoušíme víckrát, ať netestujeme starou verzi.
          ok=0
          for i in 1 2 3 4 5 6 7 8; do
            if node scripts/prod-smoke.mjs; then ok=1; break; fi
            echo "::notice::smoke pokus $i neprošel, čekám na deploy…"; sleep 30
          done
          [ "$ok" = 1 ] || { echo "::error::Smoke-test produkce neprošel."; exit 1; }
          echo "--- validace správnosti backtestu ---"
          node scripts/backtest-validate.mjs
